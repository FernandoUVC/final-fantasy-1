<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="stylesheet" href="./EJS/emulator.min.css">
<title>Final Fantasy (NES) — local</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
    padding: 16px;
    min-height: 100vh;
  }
  h1 {
    font-size: 1.1rem;
    margin: 0 0 14px;
    color: #f8fafc;
  }
  .card {
    background: #1e293b;
    border-radius: 14px;
    padding: 18px;
    max-width: 640px;
    margin: 0 auto 16px;
  }
  input[type="file"] {
    width: 100%;
    color: #e2e8f0;
    margin-bottom: 12px;
  }
  button {
    background: #38bdf8;
    color: #0f172a;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #game {
    width: 100%;
    max-width: 640px;
    aspect-ratio: 4/3;
    margin: 0 auto;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
  }
  #log {
    max-width: 640px;
    margin: 12px auto 0;
    font-size: 0.8rem;
    color: #94a3b8;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 10px;
    max-height: 140px;
    overflow-y: auto;
  }
  #log div { margin-bottom: 4px; }
  #log .ok { color: #4ade80; }
  .hint {
    font-size: 0.8rem;
    color: #94a3b8;
    margin-top: 8px;
  }
</style>
</head>
<body>

  <div class="card" id="setup-card">
    <h1>🎮 Final Fantasy (NES) — versión local</h1>
    <p class="hint">Selecciona tu archivo .nes de Final Fantasy para empezar. Se guarda solo en esta sesión, no se sube a ningún lado.</p>
    <input type="file" id="romInput" accept=".nes,.zip">
    <button id="startBtn" disabled>Cargar juego</button>
  </div>

  <div id="game"></div>
  <div id="log"></div>

<script>
  const romInput = document.getElementById('romInput');
  const startBtn = document.getElementById('startBtn');
  const setupCard = document.getElementById('setup-card');
  const logBox = document.getElementById('log');
  let romFile = null;

  function log(msg, ok) {
    const line = document.createElement('div');
    if (ok) line.className = 'ok';
    line.textContent = msg;
    logBox.prepend(line);
  }

  // Capturamos todo lo que el emulador imprima en consola (logs, warnings, errores)
  // y lo mostramos aquí mismo, porque en el celular no es fácil abrir devtools.
  ['log', 'warn', 'error'].forEach((level) => {
    const original = console[level].bind(console);
    console[level] = function (...args) {
      original(...args);
      try {
        const text = args
          .map((a) => {
            if (typeof a === 'string') return a;
            try { return JSON.stringify(a); } catch { return String(a); }
          })
          .join(' ');
        if (text && text.trim()) {
          log(`[${level}] ${text}`);
        }
      } catch (e) {}
    };
  });

  window.addEventListener('error', (e) => {
    log('[error global] ' + e.message);
  });

  romInput.addEventListener('change', () => {
    romFile = romInput.files[0] || null;
    startBtn.disabled = !romFile;
  });

  function pad(n) { return String(n).padStart(2, '0'); }

  function timestamp() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
  }

  function downloadSaveState(buffer) {
    const name = `FF1_${timestamp()}.state`;
    const blob = new Blob([buffer], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    log(`Guardado: ${name}`, true);
  }

  startBtn.addEventListener('click', () => {
    if (!romFile) return;
    setupCard.style.display = 'none';

    const gameUrl = URL.createObjectURL(romFile);

    window.EJS_player = '#game';
    window.EJS_core = 'nes';
    window.EJS_pathtodata = './EJS/';
    window.EJS_oldCores = true;
    window.EJS_gameUrl = gameUrl;
    window.EJS_gameName = 'FinalFantasy';
    window.EJS_startOnLoaded = false;
    window.EJS_backgroundColor = '#000';

    // Hook oficial: se llama cuando se presiona el botón de Save State.
    // La forma exacta del payload no está 100% documentada, así que buscamos
    // de forma defensiva cuál elemento es el binario real (no el screenshot).
    window.EJS_onSaveState = function (e) {
      try {
        const candidates = [];
        if (Array.isArray(e)) {
          candidates.push(...e);
        } else if (e && typeof e === 'object') {
          candidates.push(e.state, e.save, e.data, e.screenshot);
        } else {
          candidates.push(e);
        }

        let stateData = null;
        for (const c of candidates) {
          if (c instanceof Uint8Array || c instanceof ArrayBuffer || c instanceof Blob) {
            stateData = c;
            break;
          }
        }

        if (stateData) {
          downloadSaveState(stateData);
        } else {
          console.log('EJS_onSaveState payload completo (revisar estructura):', e);
          log('No identifiqué el save state binario — revisa la consola y mándame lo que salga. El Save State normal del emulador debería seguir funcionando mientras tanto.');
        }
      } catch (err) {
        log('Error al guardar: ' + err.message);
        console.error(err);
      }
    };

    window.EJS_ready = function () {
      log('Emulador listo. Usa "Save State" para guardar y "Load State" para cargar un archivo.', true);
    };

    const script = document.createElement('script');
    script.src = './EJS/emulator.min.js';
    document.body.appendChild(script);
  });
</script>
</body>
</html>
